<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root{--brand:#1a73e8;--brand-dark:#1557b0;--green:#ecfdf5;--green-b:#38761d;
      --yellow:#fffbeb;--yellow-b:#bf9000;--red:#fff1f2;--red-b:#cc0000;--grey-b:#5f6368;--danger:#d93025;
      --table-header-height:29px;}
    *{box-sizing:border-box;}
    [v-cloak]{display:none;}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;margin:0;padding:8px;background:#f8f9fa;color:#202124;}
    .header{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:8px;}
    h2{margin:0;color:var(--brand);font-size:20px;}
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    button{background:var(--brand);color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;transition:background-color .15s ease;}
    button:hover:not(:disabled){background:var(--brand-dark);}
    button:disabled{background:#ccc;cursor:not-allowed;}
    button.ghost{background:#e8eaed;color:#3c4043;}
    button.ghost:hover:not(:disabled){background:#dadce0;}
    button.danger{background:var(--danger);}
    button.danger:hover:not(:disabled){background:#b3271b;}
    .toggle{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--grey-b);cursor:pointer;user-select:none;}
    .pending-indicator{font-size:12px;font-weight:700;color:var(--brand);background:#eef3fe;padding:5px 10px;border-radius:10px;white-space:nowrap;}
    .property-select{width:auto;padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;color:#202124;font-weight:600;}
    /* admin bar */
    #adminBar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#eef3fe;border:1px solid #cfe0ff;
      border-radius:8px;padding:10px 12px;margin-bottom:10px;}
    #adminBar .who{font-size:12px;color:var(--grey-b);margin-left:auto;}
    #adminBar label.upload{background:var(--brand);color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;}
    #adminBar label.upload:hover{background:var(--brand-dark);}
    #adminBar input[type=file]{display:none;}
    .admin-title{font-weight:700;color:#3c4043;}
    .tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
    .tab{background:#e8eaed;color:#3c4043;padding:8px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-weight:600;border:none;}
    .tab.active{background:var(--brand);color:#fff;}
    .tab .count{font-weight:400;opacity:.85;margin-left:6px;font-size:12px;}
    .toast-stack{position:fixed;top:16px;right:16px;z-index:60;display:flex;flex-direction:column;gap:8px;max-width:320px;}
    .toast{padding:10px 36px 10px 12px;border-radius:6px;font-weight:600;font-size:13px;box-shadow:0 2px 10px rgba(0,0,0,.18);position:relative;animation:toast-in .15s ease;}
    .toast-close{position:absolute;top:6px;right:6px;background:none;border:none;padding:2px 6px;font-size:14px;line-height:1;cursor:pointer;color:inherit;opacity:.6;}
    .toast-close:hover{opacity:1;}
    @keyframes toast-in{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
    .s-loading{background:#e8f0fe;color:var(--brand);}
    .s-success{background:#d4edda;color:#155724;}
    .s-error{background:#f8d7da;color:#721c24;}
    .progress-wrap{min-width:220px;}
    .progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--green-b);width:0%;transition:width .3s;}
    .progress-label{font-size:12px;color:var(--grey-b);margin-top:2px;}
    .table-container{width:100%;max-height:680px;overflow:auto;border:1px solid #ddd;background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.05);}
    table{width:100%;border-collapse:collapse;}
    th{background:#f1f3f4;padding:4px 8px;text-align:left;position:sticky;top:0;z-index:2;box-shadow:0 1px 0 #ddd;font-size:12px;white-space:nowrap;position:relative;height:var(--table-header-height);}
    th[draggable=true]{cursor:grab;}
    .col-resize{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:col-resize;user-select:none;}
    .col-resize:hover{background:rgba(0,0,0,.15);}
    td{padding:4px 8px;border-bottom:1px solid #eee;font-size:13px;vertical-align:middle;white-space:nowrap;}
    tr{transition:background-color .25s ease;}
    tr.section td{background:#eef1f5;font-weight:700;color:#3c4043;text-transform:uppercase;letter-spacing:.03em;font-size:12px;position:sticky;top:var(--table-header-height);z-index:1;white-space:normal;}
    tr.empty td{color:var(--grey-b);font-style:italic;font-size:12px;white-space:normal;}
    tr.row-correct{background:var(--green);}
    tr.row-review{background:var(--yellow);}
    tr.row-adjust{background:var(--red);}
    .dup-badge{display:inline-block;margin-left:6px;font-size:10px;font-weight:700;color:#fff;background:var(--grey-b);border-radius:8px;padding:1px 6px;vertical-align:middle;}
    .flag{font-weight:600;color:var(--red-b);}
    .qty{text-align:right;font-variant-numeric:tabular-nums;}
    .variance-high{color:var(--red-b);font-weight:700;}
    .variance-mid{color:var(--yellow-b);font-weight:700;}
    .note-cell{min-width:280px;white-space:normal;}
    .cat-btns{display:flex;gap:4px;margin-bottom:6px;}
    .cat-btn{flex:1;font-size:11px;padding:5px 4px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#444;cursor:pointer;font-weight:700;letter-spacing:.02em;}
    .cat-btn.cat-correct{border-color:var(--green-b);color:var(--green-b);}
    .cat-btn.cat-review{border-color:var(--yellow-b);color:var(--yellow-b);}
    .cat-btn.cat-adjust{border-color:var(--red-b);color:var(--red-b);}
    .cat-btn.active.cat-correct{background:var(--green-b);color:#fff;}
    .cat-btn.active.cat-review{background:var(--yellow-b);color:#fff;}
    .cat-btn.active.cat-adjust{background:var(--red-b);color:#fff;}
    .cat-btn:hover{filter:brightness(.97);}
    .note-cell select{width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:12px;background:#fff;color:#202124;}
    .sync-cell{font-size:11px;}
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 7px;border-radius:8px;white-space:nowrap;}
    .badge-pending{background:#fff2cc;color:var(--yellow-b);}
    .badge-syncing{background:#e8f0fe;color:var(--brand);}
    .badge-synced{background:#d4edda;color:#155724;}
    .badge-error{background:#f8d7da;color:#721c24;cursor:help;}
    .muted{color:var(--grey-b);font-size:12px;}
    .empty-state{padding:60px 20px;text-align:center;color:var(--grey-b);}
    /* modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;}
    .modal{background:#fff;border-radius:10px;max-width:460px;width:92%;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.3);}
    .modal h3{margin:0 0 10px;color:var(--brand);}
    .modal .warn{background:#fff3cd;border:1px solid #ffe08a;color:#7a5b00;border-radius:6px;padding:12px;}
    .modal ul{margin:8px 0 0 18px;padding:0;}
    .modal .row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
    .spin{display:inline-block;width:14px;height:14px;border:2px solid #cfe0ff;border-top-color:var(--brand);border-radius:50%;animation:s .8s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes s{to{transform:rotate(360deg);}}
    .settings-modal{max-width:600px;max-height:86vh;overflow-y:auto;}
    .settings-section{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #eee;}
    .settings-section:last-of-type{border-bottom:none;}
    .settings-section h4{margin:0 0 4px;color:#3c4043;}
    .settings-error{background:#f8d7da;color:#721c24;padding:8px 10px;border-radius:6px;font-size:13px;margin-bottom:10px;}
    .chip-list{list-style:none;margin:8px 0;padding:0;display:flex;flex-wrap:wrap;gap:6px;}
    .chip-list li{background:#f1f3f4;border-radius:12px;padding:4px 6px 4px 10px;font-size:12px;display:flex;align-items:center;gap:6px;}
    .chip-remove{border:none;background:none;color:var(--danger);font-weight:700;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}
    .add-row{display:flex;gap:6px;}
    .add-row input{flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;}
    .col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-top:6px;}
    .col-grid label{font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;}
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div class="toast-stack">
      <div v-for="t in toasts" :key="t.id" :class="['toast', 's-' + t.type]">
        {{ t.msg }}
        <button class="toast-close" @click="dismissToast(t.id)" aria-label="Dismiss">×</button>
      </div>
    </div>

    <div v-if="bootLoading" class="empty-state"><span class="spin"></span>Loading…</div>

    <div v-else-if="!bootstrap.properties.length" class="empty-state">
      No properties are configured for your account.<br>Contact an admin.
    </div>

    <template v-else>
      <div class="header">
        <h2>{{ activeProperty ? activeProperty.name + ' — Items to Review' : 'Items to Review' }}</h2>
        <div class="controls">
          <select v-if="bootstrap.properties.length > 1" class="property-select"
            :value="activeProperty && activeProperty.id" @change="onPropertyChange($event.target.value)">
            <option v-for="p in bootstrap.properties" :key="p.id" :value="p.id">{{ p.name }}</option>
          </select>
          <div class="progress-wrap" v-if="activeTab">
            <div class="progress-bar"><div class="progress-fill" :style="{width: progressPct + '%'}"></div></div>
            <div class="progress-label">{{ progressLabel }}</div>
          </div>
          <span class="pending-indicator" v-if="pendingCount">{{ pendingCount }} pending sync</span>
          <label class="toggle"><input type="checkbox" v-model="autoSync"> Auto-sync</label>
          <button @click="syncPending" :disabled="!pendingCount || syncing">
            {{ syncing ? 'Syncing…' : (pendingCount ? 'Sync now (' + pendingCount + ')' : 'Sync now') }}
          </button>
          <button class="ghost" @click="loadData()" :disabled="loading">Refresh</button>
          <button class="ghost" v-if="session.isAdmin" @click="openSettings">⚙ Settings</button>
        </div>
      </div>

      <div id="adminBar" v-if="session.isAdmin">
        <span class="admin-title">Admin</span>
        <label class="upload">Upload monthly counts (CSV)
          <input type="file" accept=".csv" @change="onCsvFileChosen">
        </label>
        <button class="danger" @click="askRemove">Remove all data</button>
        <span class="who">signed in as {{ session.email || 'unknown' }}<template v-if="bootstrap.isGlobalAdmin"> · global admin</template></span>
      </div>

      <div class="tabs" v-if="tabsRaw.length">
        <button v-for="t in tabsRaw" :key="t.key" :class="['tab', { active: t.key === activeKey }]" @click="activeKey = t.key">
          {{ t.label }}<span class="count">{{ t.counts.reviewed }}/{{ t.counts.total }}</span>
        </button>
      </div>

      <div class="table-container" v-if="activeTab">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th v-for="col in visibleColumnDefs" :key="col.key" :class="colClass(col.key)" :style="colStyle(col.key)"
                draggable="true" @dragstart="onColDragStart(col.key, $event)" @dragover.prevent @drop="onColDrop(col.key, $event)">
                {{ col.label }}<span class="col-resize" draggable="false" @mousedown="startResize(col.key, $event)"></span>
              </th>
              <th>Notes / SOP Action</th>
              <th>Sync</th>
            </tr>
          </thead>
          <tbody>
            <template v-for="section in activeTab.sections" :key="section.key">
              <tr class="section"><td :colspan="totalCols">{{ section.label }}</td></tr>
              <tr class="empty" v-if="!section.items.length"><td :colspan="totalCols">No items in this category.</td></tr>
              <tr v-for="it in section.items" :key="section.key + '-' + it.row" :class="rowClass(it)">
                <td><strong>{{ it.item }}</strong>
                  <span class="dup-badge" v-if="dupCounts[it.row] > 1" :title="'Appears in ' + dupCounts[it.row] + ' categories'">×{{ dupCounts[it.row] }}</span>
                </td>
                <td v-for="col in visibleColumnDefs" :key="col.key" :class="[colClass(col.key), varianceClass(col.key, it.variance)]" :style="colStyle(col.key)">
                  <span v-if="col.key === 'flag' && it.flag" class="flag">{{ it.flag }}</span>
                  <template v-else>{{ formatCell(it, col.key) }}</template>
                </td>
                <td class="note-cell">
                  <div class="cat-btns">
                    <button v-for="g in CATEGORY_GROUPS" :key="g"
                      :class="['cat-btn', 'cat-' + g.toLowerCase(), { active: categoryOf(it.row) === g }]"
                      @click="pickCategory(it, g)">{{ g }}</button>
                  </div>
                  <select :value="noteOf(it.row)" @change="onSelect(it, $event.target.value)">
                    <option value="" disabled>{{ categoryOf(it.row) ? 'Select action…' : 'Pick a category above, or choose…' }}</option>
                    <option v-for="c in filteredCategories(it.row)" :key="c" :value="c">{{ c }}</option>
                  </select>
                </td>
                <td class="sync-cell">
                  <span v-if="syncStatus[dkey(activeKey, it.row)] === 'pending'" class="badge badge-pending">● pending</span>
                  <span v-else-if="syncStatus[dkey(activeKey, it.row)] === 'syncing'" class="badge badge-syncing"><span class="spin" style="margin-right:0;width:10px;height:10px;"></span></span>
                  <span v-else-if="syncStatus[dkey(activeKey, it.row)] === 'error'" class="badge badge-error" :title="syncErrors[dkey(activeKey, it.row)] || 'Sync failed'">⚠ retry</span>
                  <span v-else-if="syncStatus[dkey(activeKey, it.row)] === 'synced'" class="badge badge-synced">✓ synced</span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <p v-else-if="loading" class="muted">Loading inventory data…</p>
      <p v-else class="muted">No data yet.</p>

      <p class="muted" v-if="generatedAt">
        Loaded {{ new Date(generatedAt).toLocaleString() }}. Categories are computed live from the data store.
        Edits are kept in memory and synced to the sheet automatically (every 20s) or via "Sync now" — a note
        saves once per item and shows in every category it appears in. Drag a column header to reorder it, or
        its right edge to resize — layout resets on reload.
      </p>

      <!-- CSV upload modal -->
      <div class="overlay" v-if="csv.stage">
        <div class="modal">
          <template v-if="csv.stage === 'checking'">
            <h3>Checking existing data…</h3>
            <p><span class="spin"></span>One moment.</p>
          </template>
          <template v-else-if="csv.stage === 'confirm'">
            <h3>Replace last month's data?</h3>
            <div class="warn">
              <b>This permanently erases the current data and every note in it:</b>
              <ul><li v-for="s in csv.summary.sheets.filter(function(s){return s.rows>0;})" :key="s.name">{{ s.label }}: {{ s.rows }} rows</li></ul>
            </div>
            <div class="row"><button class="ghost" @click="closeCsvModal">Cancel</button><button class="danger" @click="doUpload">Wipe &amp; import</button></div>
          </template>
          <template v-else-if="csv.stage === 'importing'">
            <h3>Importing…</h3>
            <p><span class="spin"></span>Wiping and loading the new month.</p>
          </template>
          <template v-else-if="csv.stage === 'done'">
            <h3>Import complete</h3>
            <p>Loaded {{ csv.result.beverage }} beverage and {{ csv.result.food }} food rows.</p>
            <div class="row"><button @click="finishCsvUpload">Done</button></div>
          </template>
          <template v-else-if="csv.stage === 'error'">
            <h3>Import failed</h3>
            <p>{{ csv.error }}</p>
            <p class="muted">Existing data was not changed.</p>
            <div class="row"><button class="ghost" @click="closeCsvModal">Close</button></div>
          </template>
        </div>
      </div>

      <!-- Remove data modal -->
      <div class="overlay" v-if="removeModal.stage">
        <div class="modal">
          <template v-if="removeModal.stage === 'confirm'">
            <h3>Remove all count data?</h3>
            <div class="warn"><b>This deletes both Count Details sheets and every note.</b> The next upload will recreate them.</div>
            <div class="row"><button class="ghost" @click="closeRemoveModal">Cancel</button><button class="danger" @click="doRemove">Remove everything</button></div>
          </template>
          <template v-else-if="removeModal.stage === 'removing'">
            <h3>Removing…</h3><p><span class="spin"></span>Deleting count data.</p>
          </template>
          <template v-else-if="removeModal.stage === 'done'">
            <h3>Removed</h3><p>All count data deleted.</p>
            <div class="row"><button @click="finishRemove">Done</button></div>
          </template>
          <template v-else-if="removeModal.stage === 'error'">
            <h3>Could not remove</h3><p>{{ removeModal.error }}</p>
            <div class="row"><button class="ghost" @click="closeRemoveModal">Close</button></div>
          </template>
        </div>
      </div>

      <!-- Settings modal (property admin, and global admin) -->
      <div class="overlay" v-if="showSettings">
        <div class="modal settings-modal">
          <h3>Settings — {{ activeProperty && activeProperty.name }}</h3>
          <p class="settings-error" v-if="settingsError">{{ settingsError }}</p>

          <section class="settings-section">
            <h4>Property admins</h4>
            <p class="muted">Accounts that can upload/replace data, remove data, and change these settings for this property only. Global admins always have access to every property regardless of this list.</p>
            <ul class="chip-list">
              <li v-for="e in settingsDraft.propertyAdmins" :key="e">
                {{ e }}<button class="chip-remove" @click="removePropertyAdminEmail(e)" title="Remove">×</button>
              </li>
            </ul>
            <div class="add-row">
              <input type="email" v-model="newPropertyAdminEmail" placeholder="name@company.com" @keydown.enter.prevent="addPropertyAdminEmail">
              <button class="ghost" @click="addPropertyAdminEmail">Add</button>
            </div>
          </section>

          <section class="settings-section">
            <h4>Property users</h4>
            <p class="muted">Accounts with view-only access to this property.</p>
            <ul class="chip-list">
              <li v-for="e in settingsDraft.propertyUsers" :key="e">
                {{ e }}<button class="chip-remove" @click="removePropertyUserEmail(e)" title="Remove">×</button>
              </li>
            </ul>
            <div class="add-row">
              <input type="email" v-model="newPropertyUserEmail" placeholder="name@company.com" @keydown.enter.prevent="addPropertyUserEmail">
              <button class="ghost" @click="addPropertyUserEmail">Add</button>
            </div>
          </section>

          <section class="settings-section">
            <h4>Visible columns</h4>
            <p class="muted">Report columns shown in the review table (Item and Notes always show).</p>
            <div class="col-grid">
              <label v-for="c in settings.allColumns" :key="c.key">
                <input type="checkbox" :checked="settingsDraft.visibleColumns.includes(c.key)" @change="toggleColumn(c.key)">
                {{ c.label }}
              </label>
            </div>
          </section>

          <section class="settings-section">
            <h4>Note categories</h4>
            <p class="muted">Dropdown options managers choose from. Each must start with CORRECT, REVIEW, or ADJUST.</p>
            <ul class="chip-list">
              <li v-for="c in settingsDraft.noteCategories" :key="c">
                {{ c }}<button class="chip-remove" @click="removeCategory(c)" title="Remove">×</button>
              </li>
            </ul>
            <div class="add-row">
              <input type="text" v-model="newCategory" placeholder="ADJUST - …" @keydown.enter.prevent="addCategory">
              <button class="ghost" @click="addCategory">Add</button>
            </div>
          </section>

          <section class="settings-section">
            <h4>Reset</h4>
            <p class="muted">Restore this property's admins, users, columns, and categories to the hardcoded defaults.</p>
            <button class="danger" @click="resetSettingsToDefault">Reset to defaults</button>
          </section>

          <section class="settings-section" v-if="bootstrap.isGlobalAdmin">
            <h4>Global admins</h4>
            <p class="muted">Accounts with admin access to every property, always. Only global admins can edit this list.</p>
            <p class="settings-error" v-if="globalAdminsError">{{ globalAdminsError }}</p>
            <template v-if="globalAdminsDraft">
              <ul class="chip-list">
                <li v-for="e in globalAdminsDraft" :key="e">
                  {{ e }}<button class="chip-remove" @click="removeGlobalAdminEmail(e)" title="Remove">×</button>
                </li>
              </ul>
              <div class="add-row">
                <input type="email" v-model="newGlobalAdminEmail" placeholder="name@company.com" @keydown.enter.prevent="addGlobalAdminEmail">
                <button class="ghost" @click="addGlobalAdminEmail">Add</button>
              </div>
              <div class="row"><button class="ghost" @click="saveGlobalAdminsDraft">Save global admins</button></div>
            </template>
          </section>

          <div class="row">
            <button class="ghost" @click="closeSettings">Cancel</button>
            <button @click="saveSettingsDraft">Save settings</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.31/dist/vue.global.prod.js"></script>
  <script>
    var CATEGORY_GROUPS = ['CORRECT', 'REVIEW', 'ADJUST'];
    var NUMERIC_COLS = ['currentQty', 'currentCost', 'currentTotal', 'previousQty', 'prevCost', 'prevTotal', 'adjustment', 'variance'];
    var CURRENCY_COLS = ['currentCost', 'currentTotal', 'prevCost', 'prevTotal'];
    var STATUS_CLASS = { correct: 'row-correct', review: 'row-review', adjust: 'row-adjust' };
    var AUTO_SYNC_MS = 20000;

    // Promise wrapper around google.script.run so call sites can use async/await
    // instead of chained .withSuccessHandler()/.withFailureHandler() callbacks.
    var gas = function (funcName) {
      var args = Array.prototype.slice.call(arguments, 1);
      return new Promise(function (resolve, reject) {
        var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
        runner[funcName].apply(runner, args);
      });
    };

    var app = Vue.createApp({
      data: function () {
        return {
          CATEGORY_GROUPS: CATEGORY_GROUPS,
          bootLoading: true,
          bootstrap: { email: '', isGlobalAdmin: false, properties: [] },
          activeProperty: null,
          tabsRaw: [],
          activeKey: null,
          session: { email: '', isAdmin: false },
          settings: { visibleColumns: [], noteCategories: [], allColumns: [], propertyAdmins: [], propertyUsers: [] },
          generatedAt: null,
          loading: true,
          toasts: [],
          _toastSeq: 0,
          pending: {},        // dkey -> { datastore, row, note, item }
          origNotes: {},      // dkey -> note as last loaded/synced from the sheet
          syncStatus: {},     // dkey -> 'pending' | 'syncing' | 'synced' | 'error'
          syncErrors: {},     // dkey -> error message
          categoryOverride: {}, // dkey -> 'CORRECT' | 'REVIEW' | 'ADJUST' chosen this session
          autoSync: true,
          syncing: false,
          csvFileText: null,
          csv: { stage: null, summary: null, error: null, result: null },
          removeModal: { stage: null, error: null },
          showSettings: false,
          settingsDraft: null,
          newPropertyAdminEmail: '',
          newPropertyUserEmail: '',
          newCategory: '',
          settingsError: '',
          globalAdmins: [],
          globalAdminsDraft: null,
          newGlobalAdminEmail: '',
          globalAdminsError: '',
          // view ergonomics — session only, reset on page reload
          columnOrder: [],
          columnWidths: {},
          dragKey: null
        };
      },
      computed: {
        activeTab: function () {
          var self = this;
          return this.tabsRaw.filter(function (t) { return t.key === self.activeKey; })[0] || null;
        },
        visibleColumnDefs: function () {
          var vis = this.settings.visibleColumns;
          var all = this.settings.allColumns;
          var byKey = {};
          all.forEach(function (c) { byKey[c.key] = c; });
          var order = this.columnOrder.length ? this.columnOrder : all.map(function (c) { return c.key; });
          return order.filter(function (k) { return vis.indexOf(k) !== -1 && byKey[k]; }).map(function (k) { return byKey[k]; });
        },
        totalCols: function () { return this.visibleColumnDefs.length + 3; },
        pendingCount: function () { return Object.keys(this.pending).length; },
        dupCounts: function () {
          var c = {};
          if (!this.activeTab) return c;
          this.activeTab.sections.forEach(function (s) {
            s.items.forEach(function (it) { c[it.row] = (c[it.row] || 0) + 1; });
          });
          return c;
        },
        progressPct: function () {
          if (!this.activeTab || !this.activeTab.counts.total) return 0;
          return Math.round(100 * this.activeTab.counts.reviewed / this.activeTab.counts.total);
        },
        progressLabel: function () {
          if (!this.activeTab) return '—';
          return this.activeTab.counts.reviewed + ' of ' + this.activeTab.counts.total + ' reviewed (' + this.progressPct + '%)';
        }
      },
      mounted: function () {
        this.loadBootstrap();
        this._autoSyncTimer = setInterval(this.autoSyncTick, AUTO_SYNC_MS);
        this._beforeUnload = this.onBeforeUnload.bind(this);
        window.addEventListener('beforeunload', this._beforeUnload);
      },
      beforeUnmount: function () {
        clearInterval(this._autoSyncTimer);
        window.removeEventListener('beforeunload', this._beforeUnload);
      },
      methods: {
        dkey: function (ds, row) { return ds + ' ' + row; },

        showStatus: function (msg, type) {
          var self = this;
          if (type === 'loading') {
            // a new operation starting supersedes whatever was showing before,
            // same as the old single-banner behavior
            this.toasts = [];
          } else {
            this.toasts = this.toasts.filter(function (t) { return t.type !== 'loading'; });
          }
          var id = ++this._toastSeq;
          this.toasts.push({ id: id, msg: msg, type: type });
          if (type === 'success') {
            setTimeout(function () { self.dismissToast(id); }, 3000);
          }
          // 'error' toasts persist until manually dismissed; 'loading' is dismissed
          // implicitly when the follow-up success/error toast arrives.
        },
        dismissToast: function (id) {
          this.toasts = this.toasts.filter(function (t) { return t.id !== id; });
        },

        colClass: function (key) { return NUMERIC_COLS.indexOf(key) !== -1 ? 'qty' : ''; },
        colStyle: function (key) {
          var w = this.columnWidths[key];
          return w ? { width: w + 'px', maxWidth: w + 'px' } : {};
        },
        varianceClass: function (key, variance) {
          if (key !== 'variance' || variance === '' || variance === null || variance === -1) return '';
          if (variance >= 0.5) return 'variance-high';
          if (variance >= 0.2) return 'variance-mid';
          return '';
        },
        formatCell: function (it, key) {
          var v = it[key];
          if (v === '' || v === null || v === undefined) return '—';
          if (key === 'variance') {
            if (v === -1) return 'Zero $ cost';
            return (v * 100).toFixed(1) + '%';
          }
          if (CURRENCY_COLS.indexOf(key) !== -1) {
            var n = Number(v);
            return isNaN(n) ? '—' : n.toLocaleString(undefined, { style: 'currency', currency: 'USD' });
          }
          if (key === 'adjustment') {
            var an = Number(v);
            if (isNaN(an)) return '—';
            return (an > 0 ? '+' : '') + an.toLocaleString(undefined, { maximumFractionDigits: 2 });
          }
          if (key === 'currentQty' || key === 'previousQty') {
            var qn = Number(v);
            return isNaN(qn) ? String(v) : qn.toLocaleString(undefined, { maximumFractionDigits: 2 });
          }
          return v;
        },

        /* ---------- column reorder / resize (session-only) ---------- */
        ensureColumnOrder: function () {
          var have = {};
          this.columnOrder.forEach(function (k) { have[k] = true; });
          var self = this;
          this.settings.allColumns.forEach(function (c) { if (!have[c.key]) self.columnOrder.push(c.key); });
        },
        onColDragStart: function (key, e) {
          this.dragKey = key;
          e.dataTransfer.effectAllowed = 'move';
        },
        onColDrop: function (targetKey, e) {
          e.preventDefault();
          if (!this.dragKey || this.dragKey === targetKey) return;
          var order = this.columnOrder.slice();
          var from = order.indexOf(this.dragKey);
          var to = order.indexOf(targetKey);
          if (from === -1 || to === -1) return;
          order.splice(from, 1);
          order.splice(to, 0, this.dragKey);
          this.columnOrder = order;
          this.dragKey = null;
        },
        startResize: function (key, e) {
          e.preventDefault();
          e.stopPropagation();
          var startX = e.clientX;
          var startWidth = this.columnWidths[key] || e.target.parentElement.offsetWidth;
          var self = this;
          function onMove(ev) {
            var w = Math.max(60, startWidth + (ev.clientX - startX));
            self.columnWidths = Object.assign({}, self.columnWidths);
            self.columnWidths[key] = w;
          }
          function onUp() {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
          }
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        },

        /* ---------- bootstrap / property selection ---------- */
        loadBootstrap: async function () {
          this.bootLoading = true;
          try {
            var b = await gas('getBootstrap');
            this.bootstrap = b;
            this.bootLoading = false;
            if (!b.properties.length) return;
            if (b.properties.length === 1) { this.selectProperty(b.properties[0]); return; }
            var self = this;
            google.script.url.getLocation(function (loc) {
              var wanted = loc && loc.parameter && loc.parameter.property;
              var match = wanted && b.properties.filter(function (p) { return p.id === wanted; })[0];
              self.selectProperty(match || b.properties[0]);
            });
          } catch (err) {
            this.bootLoading = false;
            this.showStatus('Error loading properties: ' + err.message, 'error');
          }
        },
        onPropertyChange: function (id) {
          var p = this.bootstrap.properties.filter(function (x) { return x.id === id; })[0];
          if (p) this.selectProperty(p);
        },
        selectProperty: function (p) {
          this.activeProperty = p;
          this.activeKey = null;
          this.columnOrder = [];
          this.columnWidths = {};
          this.loadData(true);
        },

        /* ---------- load ---------- */
        loadData: async function (force) {
          if (!this.activeProperty) return;
          if (this.pendingCount && !force) {
            var ok = confirm('You have ' + this.pendingCount + ' unsynced change(s). Refreshing now discards them unless they finish syncing first. Refresh anyway?');
            if (!ok) return;
          }
          this.loading = true;
          this.showStatus('Loading inventory data…', 'loading');
          try {
            var payload = await gas('getInventoryData', this.activeProperty.id);
            var self = this;
            this.tabsRaw = payload.tabs;
            this.generatedAt = payload.generatedAt;
            this.session = payload.session;
            this.settings = payload.settings;
            this.ensureColumnOrder();
            if (!this.activeKey && payload.tabs.length) this.activeKey = payload.tabs[0].key;
            this.pending = {}; this.syncStatus = {}; this.syncErrors = {}; this.categoryOverride = {};
            this.origNotes = {};
            payload.tabs.forEach(function (t) {
              t.sections.forEach(function (s) {
                s.items.forEach(function (it) { self.origNotes[self.dkey(t.key, it.row)] = it.note || ''; });
              });
            });
            this.loading = false;
            this.showStatus('Data loaded.', 'success');
          } catch (err) {
            this.loading = false;
            this.showStatus('Error loading data: ' + err.message, 'error');
          }
        },

        /* ---------- review / notes ---------- */
        findItem: function (row) {
          if (!this.activeTab) return null;
          for (var i = 0; i < this.activeTab.sections.length; i++) {
            var found = this.activeTab.sections[i].items.filter(function (it) { return it.row === row; })[0];
            if (found) return found;
          }
          return null;
        },
        noteOf: function (row) {
          var k = this.dkey(this.activeKey, row);
          if (this.pending[k]) return this.pending[k].note;
          var it = this.findItem(row);
          return it ? (it.note || '') : '';
        },
        statusOf: function (note) {
          var n = (note || '').trim().toUpperCase();
          if (n.indexOf('CORRECT') === 0) return 'correct';
          if (n.indexOf('REVIEW') === 0) return 'review';
          if (n.indexOf('ADJUST') === 0) return 'adjust';
          return note ? 'other' : '';
        },
        rowClass: function (it) {
          var cls = STATUS_CLASS[this.statusOf(this.noteOf(it.row))];
          return cls || '';
        },
        categoryOf: function (row) {
          var k = this.dkey(this.activeKey, row);
          if (this.categoryOverride[k]) return this.categoryOverride[k];
          var s = this.statusOf(this.noteOf(row));
          if (s === 'correct') return 'CORRECT';
          if (s === 'review') return 'REVIEW';
          if (s === 'adjust') return 'ADJUST';
          return null;
        },
        filteredCategories: function (row) {
          var cat = this.categoryOf(row);
          var list = cat
            ? this.settings.noteCategories.filter(function (c) { return c.indexOf(cat) === 0; })
            : this.settings.noteCategories.slice();
          // Preserve legacy/free-text notes (e.g. saved before the dropdown existed, or
          // a category since removed by an admin) as a selectable option instead of
          // silently blanking the <select> when the exact string isn't in the list.
          var current = this.noteOf(row);
          if (current && list.indexOf(current) === -1) list = [current].concat(list);
          return list;
        },
        pickCategory: function (it, group) {
          var k = this.dkey(this.activeKey, it.row);
          this.categoryOverride[k] = group;
          var bare = this.settings.noteCategories.filter(function (c) { return c === group; })[0]
            || this.settings.noteCategories.filter(function (c) { return c.indexOf(group) === 0; })[0]
            || group;
          this.applyEdit(it, bare);
        },
        onSelect: function (it, value) { this.applyEdit(it, value); },
        applyEdit: function (it, value) {
          var dsKey = this.activeKey;
          var k = this.dkey(dsKey, it.row);
          var t = this.activeTab;
          t.sections.forEach(function (s) {
            s.items.forEach(function (row2) { if (row2.row === it.row) row2.note = value; });
          });
          var baseline = this.origNotes[k] !== undefined ? this.origNotes[k] : '';
          if (value === baseline) {
            delete this.pending[k];
            delete this.syncStatus[k];
          } else {
            this.pending[k] = { datastore: dsKey, row: it.row, note: value, item: it.item };
            this.syncStatus[k] = 'pending';
          }
        },

        /* ---------- sync (in-memory edits -> sheet) ---------- */
        autoSyncTick: function () { if (this.autoSync) this.syncPending(); },
        syncPending: async function () {
          var entries = [];
          for (var k in this.pending) if (this.pending.hasOwnProperty(k)) entries.push(this.pending[k]);
          if (!entries.length || this.syncing || !this.activeProperty) return;
          this.syncing = true;
          var self = this;
          var keys = entries.map(function (e) { return self.dkey(e.datastore, e.row); });
          keys.forEach(function (k) { self.syncStatus[k] = 'syncing'; });
          try {
            var res = await gas('saveNotesBatch', this.activeProperty.id, entries.map(function (e) {
              return { datastore: e.datastore, row: e.row, note: e.note, expectedItem: e.item };
            }));
            this.onSyncResult(entries, res);
          } catch (err) {
            keys.forEach(function (k) { self.syncStatus[k] = 'error'; self.syncErrors[k] = err.message; });
            this.showStatus('Sync failed: ' + err.message, 'error');
          } finally {
            this.syncing = false;
          }
        },
        onSyncResult: function (entries, res) {
          var self = this;
          var results = (res && res.results) || [];
          var okCount = 0, errCount = 0;
          entries.forEach(function (e, i) {
            var k = self.dkey(e.datastore, e.row);
            var r = results[i];
            if (r && r.ok) {
              okCount++;
              self.origNotes[k] = e.note;
              delete self.pending[k];
              self.syncStatus[k] = 'synced';
              setTimeout(function () { if (self.syncStatus[k] === 'synced') delete self.syncStatus[k]; }, 2500);
            } else {
              errCount++;
              self.syncStatus[k] = 'error';
              self.syncErrors[k] = (r && r.error) || 'Unknown error';
            }
          });
          if (res && res.progress) {
            Object.keys(res.progress).forEach(function (dsKey) {
              var t = self.tabsRaw.filter(function (x) { return x.key === dsKey; })[0];
              if (t) t.counts = res.progress[dsKey];
            });
          }
          if (errCount) this.showStatus(okCount + ' synced, ' + errCount + ' failed — will retry.', 'error');
          else this.showStatus('Synced ' + okCount + ' change(s).', 'success');
        },
        onBeforeUnload: function (e) {
          if (this.pendingCount) {
            e.preventDefault();
            e.returnValue = 'You have unsynced changes.';
            return e.returnValue;
          }
        },

        /* ---------- CSV upload / remove (admin) ---------- */
        onCsvFileChosen: function (e) {
          var f = e.target.files[0]; if (!f) return;
          var reader = new FileReader();
          var self = this;
          reader.onload = async function (ev) {
            self.csvFileText = ev.target.result;
            e.target.value = '';
            self.csv = { stage: 'checking', summary: null, error: null, result: null };
            try {
              var summary = await gas('getExistingDataSummary', self.activeProperty.id);
              self.csv.summary = summary;
              if (summary.hasData) { self.csv.stage = 'confirm'; }
              else { self.doUpload(); }
            } catch (err) {
              self.csv.stage = 'error'; self.csv.error = err.message;
            }
          };
          reader.readAsText(f);
        },
        doUpload: async function () {
          this.csv.stage = 'importing';
          try {
            var res = await gas('processCSVData', this.activeProperty.id, this.csvFileText);
            this.csv.stage = 'done'; this.csv.result = res;
          } catch (err) {
            this.csv.stage = 'error'; this.csv.error = err.message;
          }
        },
        closeCsvModal: function () { this.csv = { stage: null, summary: null, error: null, result: null }; },
        finishCsvUpload: function () { this.closeCsvModal(); this.loadData(true); },

        askRemove: function () { this.removeModal = { stage: 'confirm', error: null }; },
        doRemove: async function () {
          this.removeModal.stage = 'removing';
          try {
            await gas('removeAllCountData', this.activeProperty.id);
            this.removeModal.stage = 'done';
          } catch (err) {
            this.removeModal.stage = 'error'; this.removeModal.error = err.message;
          }
        },
        closeRemoveModal: function () { this.removeModal = { stage: null, error: null }; },
        finishRemove: function () { this.closeRemoveModal(); this.loadData(true); },

        /* ---------- settings (property admin) ---------- */
        openSettings: function () {
          this.settingsDraft = {
            propertyAdmins: this.settings.propertyAdmins.slice(),
            propertyUsers: this.settings.propertyUsers.slice(),
            visibleColumns: this.settings.visibleColumns.slice(),
            noteCategories: this.settings.noteCategories.slice()
          };
          this.newPropertyAdminEmail = ''; this.newPropertyUserEmail = ''; this.newCategory = ''; this.settingsError = '';
          this.globalAdmins = []; this.globalAdminsDraft = null; this.newGlobalAdminEmail = ''; this.globalAdminsError = '';
          this.showSettings = true;
          if (this.bootstrap.isGlobalAdmin) this.loadGlobalAdmins();
        },
        closeSettings: function () { this.showSettings = false; this.settingsDraft = null; },
        addPropertyAdminEmail: function () {
          var e = this.newPropertyAdminEmail.trim();
          if (!e) return;
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { this.settingsError = 'Enter a valid email address.'; return; }
          var exists = this.settingsDraft.propertyAdmins.some(function (x) { return x.toLowerCase() === e.toLowerCase(); });
          if (!exists) this.settingsDraft.propertyAdmins.push(e);
          this.newPropertyAdminEmail = ''; this.settingsError = '';
        },
        removePropertyAdminEmail: function (email) {
          if (!this.bootstrap.isGlobalAdmin && this.session.email && email.toLowerCase() === this.session.email.toLowerCase()) {
            if (!confirm('This removes your own admin access to this property. Continue?')) return;
          }
          this.settingsDraft.propertyAdmins = this.settingsDraft.propertyAdmins.filter(function (e) { return e !== email; });
        },
        addPropertyUserEmail: function () {
          var e = this.newPropertyUserEmail.trim();
          if (!e) return;
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { this.settingsError = 'Enter a valid email address.'; return; }
          var exists = this.settingsDraft.propertyUsers.some(function (x) { return x.toLowerCase() === e.toLowerCase(); });
          if (!exists) this.settingsDraft.propertyUsers.push(e);
          this.newPropertyUserEmail = ''; this.settingsError = '';
        },
        removePropertyUserEmail: function (email) {
          this.settingsDraft.propertyUsers = this.settingsDraft.propertyUsers.filter(function (e) { return e !== email; });
        },
        toggleColumn: function (key) {
          var i = this.settingsDraft.visibleColumns.indexOf(key);
          if (i === -1) this.settingsDraft.visibleColumns.push(key);
          else this.settingsDraft.visibleColumns.splice(i, 1);
        },
        addCategory: function () {
          var c = this.newCategory.trim().toUpperCase();
          if (!c) return;
          if (!/^(CORRECT|REVIEW|ADJUST)/.test(c)) { this.settingsError = 'Category must start with CORRECT, REVIEW, or ADJUST.'; return; }
          if (this.settingsDraft.noteCategories.indexOf(c) === -1) this.settingsDraft.noteCategories.push(c);
          this.newCategory = ''; this.settingsError = '';
        },
        removeCategory: function (c) {
          if (this.settingsDraft.noteCategories.length <= 1) { this.settingsError = 'At least one note category is required.'; return; }
          this.settingsDraft.noteCategories = this.settingsDraft.noteCategories.filter(function (x) { return x !== c; });
        },
        saveSettingsDraft: async function () {
          this.settingsError = '';
          try {
            var s = await gas('saveSettings', this.activeProperty.id, this.settingsDraft);
            this.settings = s;
            this.ensureColumnOrder();
            this.showSettings = false;
            this.settingsDraft = null;
            this.showStatus('Settings saved.', 'success');
          } catch (err) {
            this.settingsError = err.message;
          }
        },
        resetSettingsToDefault: async function () {
          if (!confirm('Reset this property\'s settings to the hardcoded defaults? This clears custom admins, users, columns, and categories.')) return;
          this.settingsError = '';
          try {
            var s = await gas('resetSettings', this.activeProperty.id);
            this.settings = s;
            this.ensureColumnOrder();
            this.settingsDraft = {
              propertyAdmins: s.propertyAdmins.slice(), propertyUsers: s.propertyUsers.slice(),
              visibleColumns: s.visibleColumns.slice(), noteCategories: s.noteCategories.slice()
            };
            this.showStatus('Settings reset to defaults.', 'success');
          } catch (err) {
            this.settingsError = err.message;
          }
        },

        /* ---------- global admins (global admin only) ---------- */
        loadGlobalAdmins: async function () {
          try {
            var list = await gas('getGlobalAdmins');
            this.globalAdmins = list; this.globalAdminsDraft = list.slice();
          } catch (err) {
            this.globalAdminsError = err.message;
          }
        },
        addGlobalAdminEmail: function () {
          var e = this.newGlobalAdminEmail.trim();
          if (!e) return;
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { this.globalAdminsError = 'Enter a valid email address.'; return; }
          var exists = this.globalAdminsDraft.some(function (x) { return x.toLowerCase() === e.toLowerCase(); });
          if (!exists) this.globalAdminsDraft.push(e);
          this.newGlobalAdminEmail = ''; this.globalAdminsError = '';
        },
        removeGlobalAdminEmail: function (email) {
          if (this.globalAdminsDraft.length <= 1) { this.globalAdminsError = 'At least one global admin is required.'; return; }
          if (this.session.email && email.toLowerCase() === this.session.email.toLowerCase()) {
            if (!confirm('This removes your own global admin access. Continue?')) return;
          }
          this.globalAdminsDraft = this.globalAdminsDraft.filter(function (e) { return e !== email; });
        },
        saveGlobalAdminsDraft: async function () {
          this.globalAdminsError = '';
          try {
            var list = await gas('saveGlobalAdmins', this.globalAdminsDraft);
            this.globalAdmins = list; this.globalAdminsDraft = list.slice();
            this.showStatus('Global admins saved.', 'success');
          } catch (err) {
            this.globalAdminsError = err.message;
          }
        }
      }
    });

    app.mount('#app');
  </script>
</body>
</html>
